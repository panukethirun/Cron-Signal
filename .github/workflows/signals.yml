name: trading-signals

on:
  schedule:
    - cron: "5 * * * *"   # ทุกชั่วโมง เวลานาทีที่ 05 (UTC) — รอให้แท่ง 1H ปิดก่อน
  workflow_dispatch: {}     # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write           # ใช้ commit state.json กลับเข้า repo

concurrency:
  group: trading-signals
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run signal bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}       # AI sentiment (ไม่ใส่ก็ได้)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}   # Telegram (แนะนำ)
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}  # ไม่ใส่ก็ได้
          LINE_TO: ${{ secrets.LINE_TO }}
          ALWAYS_SEND: "true"                 # ส่ง Telegram + ยิง DeepSeek ทุกรอบ (ไม่รอสัญญาณเปลี่ยน)
        run: python main.py

      - name: Persist state & dashboard data
        run: |
          if [[ -n "$(git status --porcelain state.json signals.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json signals.json
            git commit -m "chore: update signals [skip ci]"
            git push
          fi
