name: trading-signals

on:
  schedule:
    - cron: "5 * * * *"   # ทุกชั่วโมง เวลานาทีที่ 05 (UTC) — รอให้แท่ง 1H ปิดก่อน
  workflow_dispatch: {}     # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write           # ใช้ commit state.json กลับเข้า repo

concurrency:
  group: trading-signals
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run signal bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}     # ไม่ใส่ก็ได้ (จะ broadcast แทน)
          ALWAYS_SEND: "false"                # เปลี่ยนเป็น "true" ถ้าอยากให้ส่งทุกชั่วโมง
        run: python main.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update signal state [skip ci]"
            git push
          fi
